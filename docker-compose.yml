services:
  mysql:
    image: mysql:8.0
    container_name: shopify-conector
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: shopify_conector
      MYSQL_USER: user
      MYSQL_PASSWORD: 11223344
      MYSQL_ROOT_PASSWORD: 11223344
      TZ: America/Mazatlan
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
